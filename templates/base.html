<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Legit Dashboard{% endblock %}</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #202124;
      --muted: #626a73;
      --line: #d8dde3;
      --panel: #ffffff;
      --bg: #f5f7f9;
      --accent: #0d766e;
      --accent-dark: #095952;
      --warn: #a35d00;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }
    a { color: var(--accent-dark); text-decoration: none; }
    a:hover { text-decoration: underline; }
    header {
      background: #fff;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .nav {
      align-items: center;
      display: flex;
      gap: 24px;
      min-height: 64px;
      margin: 0 auto;
      max-width: 1180px;
      padding: 0 24px;
    }
    .brand { color: var(--ink); font-size: 18px; font-weight: 750; }
    .nav-links { display: flex; gap: 16px; margin-left: auto; }
    main {
      margin: 0 auto;
      max-width: 1180px;
      padding: 32px 24px 56px;
    }
    h1 { font-size: clamp(28px, 4vw, 42px); line-height: 1.1; margin: 0 0 10px; }
    h2 { font-size: 20px; margin: 0 0 16px; }
    .eyebrow { color: var(--muted); margin: 0 0 28px; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin: 22px 0; }
    .button, button {
      background: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      display: inline-flex;
      font-weight: 650;
      min-height: 40px;
      padding: 8px 14px;
    }
    .button.secondary {
      background: #fff;
      color: var(--accent-dark);
    }
    .grid { display: grid; gap: 18px; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
    }
    .metric { color: var(--muted); font-size: 14px; }
    .metric strong { color: var(--ink); display: block; font-size: 32px; line-height: 1.1; }
    table {
      background: #fff;
      border-collapse: collapse;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      width: 100%;
    }
    th, td { border-bottom: 1px solid var(--line); padding: 12px; text-align: left; vertical-align: top; }
    th { background: #eef2f4; color: #3f464d; font-size: 13px; }
    tr:last-child td { border-bottom: 0; }
    .status {
      background: #e2f2ef;
      border-radius: 999px;
      color: #07534d;
      display: inline-block;
      font-size: 13px;
      font-weight: 650;
      padding: 3px 9px;
    }
    .status.warn { background: #fff2d9; color: var(--warn); }
    form.fields {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      display: grid;
      gap: 16px;
      max-width: 760px;
      padding: 22px;
    }
    label { display: block; font-weight: 650; margin-bottom: 6px; }
    input, select, textarea {
      border: 1px solid #b9c1ca;
      border-radius: 6px;
      font: inherit;
      padding: 9px 10px;
      width: 100%;
    }
    .errorlist { color: #a43131; margin: 0; padding-left: 20px; }
    @media (max-width: 680px) {
      .nav { align-items: flex-start; flex-direction: column; gap: 8px; padding: 14px 18px; }
      .nav-links { flex-wrap: wrap; gap: 10px 14px; margin-left: 0; }
      main { padding: 24px 18px 42px; }
      table { font-size: 14px; }
      th, td { padding: 10px 8px; }
      .actions { gap: 8px; }
      .actions form { width: 100%; }
      .actions .button,
      .actions button,
      .actions select { width: 100%; justify-content: center; }
      table.responsive-table {
        background: transparent;
        border: 0;
      }
      .responsive-table thead {
        display: none;
      }
      .responsive-table tbody,
      .responsive-table tr,
      .responsive-table td {
        display: block;
        width: 100%;
      }
      .responsive-table tr {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 8px;
        margin-bottom: 12px;
        overflow: hidden;
      }
      .responsive-table td {
        border-bottom: 1px solid var(--line);
        padding: 10px 12px;
      }
      .responsive-table td:last-child {
        border-bottom: 0;
      }
      .responsive-table td[data-label]::before {
        color: var(--muted);
        content: attr(data-label);
        display: block;
        font-size: 12px;
        font-weight: 700;
        margin-bottom: 4px;
        text-transform: uppercase;
      }
    }
  </style>
</head>
<body>
  <header>
    <nav class="nav">
      <a class="brand" href="{% url 'trip_dashboard' %}">Legit Dashboard</a>
      {% if user.is_authenticated %}
        <div class="nav-links">
          <a href="{% url 'trip_list' %}">Trips</a>
          <a href="{% url 'task_list' %}">Tasks</a>
          <a href="{% url 'task_template_list' %}">Task Templates</a>
          <a href="{% url 'admin:index' %}">Admin</a>
          <form method="post" action="{% url 'logout' %}" style="display:inline">
            {% csrf_token %}
            <button class="button secondary" type="submit">Log out</button>
          </form>
        </div>
      {% endif %}
    </nav>
  </header>
  <main>
    {% if messages %}
      <div class="panel" style="margin-bottom:18px">
        {% for message in messages %}
          <div>{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
  <script>
    (() => {
      const scrollKey = `legit-scroll:${window.location.pathname}${window.location.search}`;
      const savedScroll = sessionStorage.getItem(scrollKey);
      if (savedScroll !== null) {
        window.scrollTo({ top: Number.parseInt(savedScroll, 10) || 0, behavior: "auto" });
        sessionStorage.removeItem(scrollKey);
      }

      document.addEventListener("submit", (event) => {
        const form = event.target;
        if (!(form instanceof HTMLFormElement)) {
          return;
        }
        if (form.dataset.preserveScroll === "true") {
          sessionStorage.setItem(scrollKey, String(window.scrollY));
        }
      });
    })();
  </script>
</body>
</html>
