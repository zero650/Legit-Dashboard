services:
  web:
    build: .
    command: ${WEB_COMMAND:-python manage.py runserver 0.0.0.0:8000}
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    expose:
      - "8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2.8-alpine
    env_file:
      - .env
    environment:
      SITE_HOST: ${SITE_HOST:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-legit_dashboard}
      POSTGRES_USER: ${POSTGRES_USER:-legit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-legit}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
